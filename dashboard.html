<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<script>
if(!localStorage.getItem("login")){
    window.location.href="index.html";
}
</script>

<div class="d-flex">

<!-- Sidebar -->
<div class="sidebar p-3">
    <h4>SMS</h4>

    <button onclick="show('dash')" class="btn btn-light w-100 mt-3">Dashboard</button>
    <button onclick="show('stu')" class="btn btn-light w-100 mt-2">Students</button>
    <button onclick="show('alerts')" class="btn btn-light w-100 mt-2">Alerts</button>
    <button onclick="toggleDark()" class="btn btn-dark w-100 mt-2">Dark Mode</button>
    <button onclick="logout()" class="btn btn-danger w-100 mt-2">Logout</button>
</div>

<!-- Main -->
<div class="main p-4 w-100">

<!-- DASHBOARD -->
<div id="dash">
    <h2>Dashboard</h2>

    <div class="card p-3 text-center mt-3">
        <h6>Total Students</h6>
        <h2 id="count"></h2>
    </div>

    <canvas id="chart" class="mt-4"></canvas>
</div>

<!-- STUDENTS -->
<div id="stu" style="display:none;">
    <h2>Students</h2>

    <input class="form-control mt-3" id="search" placeholder="Search..." onkeyup="searchStudent()">

    <form id="form" class="mt-3">
        <input type="hidden" id="id">
        <input id="name" class="form-control mt-2" placeholder="Name" required>
        <input id="age" class="form-control mt-2" placeholder="Age" required>
        <input id="marks" class="form-control mt-2" placeholder="Marks" required>
        <input id="email" class="form-control mt-2" placeholder="Email" required>

        <button class="btn btn-primary mt-3 w-100">Save</button>
    </form>

    <table class="table mt-4">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Marks</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

<!-- ALERTS -->
<div id="alerts" style="display:none;">
    <h2>Alerts</h2>
    <div id="alertBox" class="mt-3"></div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
