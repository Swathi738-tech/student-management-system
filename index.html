<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="d-flex">

<!-- Sidebar -->
<div class="sidebar p-3">
    <h4>📊 Dashboard</h4>

    <button class="btn btn-outline-light w-100 mt-3" onclick="showPage('dashboard')">Dashboard</button>
    <button class="btn btn-outline-light w-100 mt-2" onclick="showPage('students')">Students</button>
</div>

<!-- Main -->
<div class="main p-4 w-100">

    <!-- DASHBOARD -->
    <div id="dashboardPage">
        <h2>Overview</h2>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card p-3 text-center shadow">
                    <h6>Total Students</h6>
                    <h2 id="count">0</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- STUDENTS -->
    <div id="studentPage" style="display:none;">

        <h2>Student Management</h2>

        <input class="form-control mt-3" id="search" placeholder="Search..." onkeyup="searchStudent()">

        <form id="form" class="mt-3">
            <input type="hidden" id="id">

            <input class="form-control mt-2" id="name" placeholder="Name" required>
            <input class="form-control mt-2" id="dept" placeholder="Department" required>
            <input class="form-control mt-2" id="email" placeholder="Email" required>

            <button class="btn btn-primary mt-3 w-100">Save Student</button>
        </form>

        <table class="table mt-4 shadow">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Dept</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table"></tbody>
        </table>

    </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
